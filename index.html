<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClassSync Board - 课程表</title>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/glassmorphism.css">
  <link rel="stylesheet" href="css/timeline.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/settings.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="bg-layer bg-layer--a"></div>
  <div class="bg-layer bg-layer--b"></div>
  <div class="bg-particles"></div>

  <div class="app">
    <header class="header glass-card">
      <div class="header__school"></div>
      <div class="header__date">
        <span class="date-text"></span>
        <span class="day-text"></span>
      </div>
      <div class="header__weather">
        <span class="weather-icon">☀️</span>
        <span class="weather-temp">--°C</span>
        <span class="weather-desc">--</span>
      </div>
      <div class="header__clock">
        <span class="clock-time">00:00:00</span>
      </div>
    </header>

    <aside class="sidebar">
      <div class="current-class-panel glass-card glass-card--elevated">
      </div>
      <div class="next-class-preview glass-card">
      </div>
      <div class="countdown-panel glass-card" id="countdown-panel">
      </div>
      <div class="plugin-area" id="plugin-area">
      </div>
    </aside>

    <main class="timeline-container">
    </main>
  </div>

  <div class="transition-overlay" id="transition-overlay">
    <div class="transition-overlay__ripple"></div>
    <div class="transition-overlay__icon"></div>
    <div class="transition-overlay__subject"></div>
    <div class="transition-overlay__status"></div>
  </div>

  <button class="fullscreen-btn glass-card" id="fullscreen-btn" title="全屏 (F11)">⛶</button>
  <button class="settings-btn glass-card" id="settings-btn" title="设置">⚙</button>

  <div class="settings-overlay" id="settings-overlay">
    <div class="settings-panel glass-card glass-card--elevated">
      <div class="settings-panel__header">
        <h2>设置</h2>
        <button class="settings-panel__close" id="settings-close">✕</button>
      </div>
      <div class="settings-panel__body" id="settings-body">
      </div>
    </div>
  </div>

  <div class="sound-init-overlay" id="sound-init">
    <div class="init-message">
      <div class="icon">🔔</div>
      <div class="text">点击任意处启动课程看板</div>
      <div class="hint">启用音效需要用户交互</div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
